<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>随机美少女视频</title>
    <link rel="icon" href="favicon.ico">
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        html,body{
            height: 100%;
        }
        #box{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        .bg-video {
            width: 500px;
            height: auto;
            object-fit:cover;
        }
        .operationButton-Box{
            margin: 5px 0;
        }
        .operationButton{
            display: block;
            margin: 0 auto;
            width: 100%;
            padding: 8px 0;
            font-size: 18px;
        }
    </style>

</head>
<body>

    <div id="box">
        <video autoplay muted loop class="bg-video" src="" id="video"></video>
        <div class="operationButton-Box">
            <button class="operationButton" id="next-But">Next</button>
        </div>
    </div>

    <script>

        let myVideo = document.getElementById('video');
        let nextBut = document.getElementById('next-But');

        let url = `http://www.wudada.online/Api/ScSp`

        async function getVideo(url){
            await fetch(url)
                .then(response => {
                    // 判断请求是否成功
                    if (response.ok) {
                        return response.json() // response.json() 解析json数据 || response.text() 解析文本数据
                    } else {
                        return Promise.reject({
                            status: response.status,
                            statusText: response.statusText
                        })
                    }
                })
                .then((data) => {
                    /*console.log(data.data)*/
                    myVideo.src = data.data;
                }).catch(err => {
                console.log(err)
            })
        }

        getVideo(url);

        nextBut.addEventListener('click', () => {
            getVideo(url);
        })

    </script>

</body>
</html>
