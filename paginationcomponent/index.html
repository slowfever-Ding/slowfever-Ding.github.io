<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>分页组件</title>
    <link rel=" icon" href="favicon.ico" />

    <script src="js/jquery-1.11.1.min.js"></script>

    <link rel="stylesheet" href="css/index.css">

    <style>
        .loaderbg {
            background-color: #fff;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 99999999
        }

        ::-webkit-scrollbar {
            width: 7.5px;
            height: 6px;
            background-color: #f0f0f0;
            display: none
        }

        ::-webkit-scrollbar-thumb {
            background-color: #b1b1b1;
            border-radius: 15px
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #777
        }

        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: -25px;
            margin-top: -30px;
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 10px
        }

        .spinner > .double {
            background: #49a9ee;
            height: 100%;
            width: 6px;
            display: inline-block;
            -webkit-animation: stretchDelay 1.2s infinite ease-in-out;
            animation: stretchDelay 1.2s infinite ease-in-out
        }

        .spinner .rect2 {
            -webkit-animation-delay: -1.1s;
            animation-delay: -1.1s
        }

        .spinner .rect3 {
            -webkit-animation-delay: -1.0s;
            animation-delay: -1.0s
        }

        .spinner .rect4 {
            -webkit-animation-delay: -0.9s;
            animation-delay: -0.9s
        }

        .spinner .rect5 {
            -webkit-animation-delay: -0.8s;
            animation-delay: -0.8s
        }

        @-webkit-keyframes stretchDelay {

            0%,
            40%,
            100% {
                -webkit-transform: scaleY(.4)
            }

            20% {
                -webkit-transform: scaleY(1)
            }
        }

        @keyframes stretchDelay {

            0%,
            40%,
            100% {
                transform: scaleY(.4);
                -webkit-transform: scaleY(.4)
            }

            20% {
                transform: scaleY(1);
                -webkit-transform: scaleY(1)
            }
        }
    </style>

</head>
<body>

<!--html-->
<div class="loaderbg" id="loader_container">
    <div class="spinner">
        <div class="double rect1"></div>
        <div class="double rect2"></div>
        <div class="double rect3"></div>
        <div class="double rect4"></div>
        <div class="double rect5"></div>
    </div>
</div>
<!--end-->

    <div id="box">
        <div style="padding: 5px 0;">

            <div class="container">
                <div class="search-container">
                    <input class="input" type="text" id="search" placeholder="search">
                    <svg viewBox="0 0 24 24" class="search__icon" id="btn">
                        <g>
                            <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                            </path>
                        </g>
                    </svg>
                </div>
            </div>

        </div>

        <div style="text-align: center;padding: 10px 0;">
            <img src="https://count.getloli.com/get/@slowfever-Ding.github.io.git?theme=rule34" alt="">
        </div>

        <div id="dataBox">
            <ul id="dataLists"></ul>
        </div>

    </div>
    <div class="box" id="pagingBox"></div>

    <!--  BOOTSTRAP -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
    <script src="https://www.jq22.com/jquery/bootstrap-3.3.4.js"></script>

    <!--  PAGINATION plugin -->
    <link rel="stylesheet" type="text/css" href="css/jquery.bs_pagination.min.css">
    <script type="text/javascript" src="js/jquery.bs_pagination.min.js"></script>
    <script type="text/javascript" src="js/zh.min.js"></script>
    <script src="js/index.js"></script>


</body>
</html>
