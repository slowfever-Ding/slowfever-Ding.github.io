<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>分页组件</title>
    <link rel=" icon" href="favicon.ico" />

    <script src="js/jquery-1.11.1.min.js"></script>

    <link rel="stylesheet" href="css/index.css">

</head>
<body>

    <div id="box">
        <div style="padding: 5px 0;">

            <div class="container">
                <div class="search-container">
                    <input class="input" type="text" id="search" placeholder="search">
                    <svg viewBox="0 0 24 24" class="search__icon" id="btn">
                        <g>
                            <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                            </path>
                        </g>
                    </svg>
                </div>
            </div>

        </div>

        <div id="dataBox">
            <ul id="dataLists"></ul>
        </div>

    </div>
    <div class="box" id="pagingBox"></div>

    <!--  BOOTSTRAP -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
    <script src="https://www.jq22.com/jquery/bootstrap-3.3.4.js"></script>

    <!--  PAGINATION plugin -->
    <link rel="stylesheet" type="text/css" href="css/jquery.bs_pagination.min.css">
    <script type="text/javascript" src="js/jquery.bs_pagination.min.js"></script>
    <script type="text/javascript" src="js/zh.min.js"></script>
    <script src="js/index.js"></script>

</html>
