<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>抖音随机视频</title>
    <link rel="icon" href="favicon.ico">
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        html,body{
            height: 100%;
        }
        #box{
            width: 500px;
            height: auto;
            position: relative;
            overflow: hidden;
            /*background: #bababa;*/
        }
        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .operationButton-Box{
            width: 100%;
            padding: 10px 0;
            position: absolute;
            bottom: 0;
            left: 0;
            backdrop-filter: blur(10px) saturate(170%);
            -webkit-backdrop-filter: blur(10px) saturate(170%);
            background-color: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(209, 213, 219, 0.3);
            border-radius: 3px;
        }
        .operationButton{
            display: block;
            margin: 0 auto;
            width: 90%;
            padding: 15px 0;
            font-size: 18px;
            background: #0b5ed7;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .operationButton:hover{
            background: #2c70d5;
        }
    </style>

</head>
<body style="display: flex;align-content: center;justify-content: center;">

<div id="box">
    <video class="video-source bg-video"
           id="video"
           width="100%"
           controls="controls"
           style="mix-blend-mode: screen;display: block;"
           webkit-playsinline="true"
           x-webkit-airplay="true"
           playsinline="true"
           x5-video-player-type="h5"
           x5-video-orientation="h5"
           x5-video-player-fullscreen="true"
           preload="auto"
           autoplay="autoplay"
           loop="loop"
    >
    <source src="https://mnapi.cn/api/rewu.php?type=video" type="video/mp4">
    <source src="" type="video/ogg">
    您的浏览器不支持 video 标签。
    </video>
    <div class="operationButton-Box">
        <button class="operationButton" id="next-But" onclick="location.reload()">Next</button>
    </div>
</div>

<script>
    window.onload = function () {
        if (!sessionStorage.getItem('MARK_STATUS')) {
            setTimeout(function () {
                sessionStorage.setItem('MARK_STATUS','true')
                alert("点击 'Next' 播放/切换 视频！ ",)
            },1500)
        }
    }
</script>

</body>
</html>
