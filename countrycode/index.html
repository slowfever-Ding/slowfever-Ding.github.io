<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>「全球国家」简易代码/地区名中英文对照表</title>

    <!-- Bootstrap5 核心 CSS 文件 -->
    <link href="./Bootstrap_css/bootstrap.min.css" rel="stylesheet">
    <!-- JavaScript 文件是可选的。从以下两种建议中选择一个即可！ -->

    <!--[if lt IE 9]>
    <script src="https://cdn.bootcdn.net/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <style>
        .container {
            font-family: "Noto Sans TC", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        /* From Uiverse.io by AbanoubMagdy1 */
        .wave-group {
            position: relative;
        }

        .wave-group .input {
            font-size: 16px;
            padding: 10px 10px 10px 5px;
            display: block;
            border: none;
            border-bottom: 1px solid #515151;
            background: transparent;
        }

        .wave-group .input:focus {
            outline: none;
        }

        .wave-group .label {
            color: #6f6f6f;
            font-size: 18px;
            font-weight: normal;
            position: absolute;
            pointer-events: none;
            left: 5px;
            top: 10px;
            display: flex;
        }

        .wave-group .label-char {
            transition: 0.2s ease all;
            transition-delay: calc(var(--index) * .05s);
        }

        .wave-group .input:focus ~ label .label-char,
        .wave-group .input:valid ~ label .label-char {
            transform: translateY(-20px);
            font-size: 14px;
            color: #ffffff;
        }

        .wave-group .bar {
            position: relative;
            display: block;
        }

        .wave-group .bar:before,.wave-group .bar:after {
            content: '';
            height: 2px;
            width: 0;
            bottom: 1px;
            position: absolute;
            background: #ffffff;
            transition: 0.2s ease all;
            -moz-transition: 0.2s ease all;
            -webkit-transition: 0.2s ease all;
        }

        .wave-group .bar:before {
            left: 50%;
        }

        .wave-group .bar:after {
            right: 50%;
        }

        .wave-group .input:focus ~ .bar:before,
        .wave-group .input:focus ~ .bar:after {
            width: 50%;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        .bg-vague {
            backdrop-filter: blur(5px) saturate(180%);
            -webkit-backdrop-filter: blur(5px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>

</head>
<body style="background: url(https://dailybing.com/api/v1) fixed center;background-size: cover;">

<div id="app">
    <div class="container bg-vague">
        <h1 class="border-bottom border-3 border-white fs-5 fw-bolder py-3 pb-2 pt-lg-4 pb-lg-3">「全球国家」简易代码/地区名中英文对照表</h1>
        <div class="table-responsive-xl pb-2">
            <table class="table table-striped table-hover text-center text-nowrap caption-top table-bordered">
                <caption>
                    <div class="wave-group">
                        <input id="search" required="" type="text" class="input w-100">
                        <span class="bar w-100"></span>
                        <label class="label">
                            <span class="label-char" style="--index: 0">搜</span>
                            <span class="label-char" style="--index: 1">索</span>
                            <span class="label-char" style="--index: 2">指</span>
                            <span class="label-char" style="--index: 3">定</span>
                            <span class="label-char" style="--index: 4">信</span>
                            <span class="label-char" style="--index: 5">息</span>
                        </label>
                    </div>
                </caption>
                <thead class="table-dark">
                    <tr>
                        <th scope="col">国家/旗帜</th>
                        <th scope="col">国名/英文</th>
                        <th scope="col">国名/中文</th>
                        <th scope="col">国家/首都</th>
                        <th scope="col">货币/符号</th>
                        <th scope="col">号码/区号</th>
                        <th scope="col">国家/代码</th>
                    </tr>
                </thead>
                <tbody id="table-tbody" class="align-middle"></tbody>
            </table>
        </div>
    </div>
    <div class="container bg-vague">
        <footer class="py-3 my-4">
            <ul class="nav justify-content-center border-bottom pb-3 mb-3">
                <li class="nav-item"><a href="https://github.com/slowfever-Ding" target="_blank" class="nav-link px-2 text-body-secondary">GitHub</a></li>
                <li class="nav-item"><a href="https://slowfever-ding.github.io/" target="_blank" class="nav-link px-2 text-body-secondary">authorURI</a></li>
                <li class="nav-item"><a href="https://slowfever-ding.github.io/blog/" target="_blank" class="nav-link px-2 text-body-secondary">authorSBlog</a></li>
            </ul>
            <p class="text-center text-body-secondary"> <span >© <script>document.write(new Date().getFullYear());</script> All rights reserved. </span></p>
        </footer>
    </div>
</div>

<script>
    let table_tbody = document.getElementById('table-tbody')
    let search = document.getElementById('search')

    // 全局变量存储获取的国家数据
    let countryData = []

    // 获取国家数据列表
    function getCountryDataList() {
        return fetch('./countries.json')
            .then(response => {
                if (response.ok) {
                    return response.json()
                } else {
                    return Promise.reject({
                        status: response.status,
                        statusText: response.statusText
                    })
                }
            })
            .then(data => {
                countryData = data // 将数据保存到全局变量
                return data
            })
            .catch(error => {
                console.log(error)
            })
    }

    // 初始化，获取并渲染国家数据
    getCountryDataList().then(data => {
        handleCountryDataList(data)
    })

    // 监听 input 事件，搜索并过滤数据
    search.addEventListener('input', function() {
        const query = search.value.trim().toLowerCase()
        filterAndRenderCountries(query)
    });

    // 搜索关键词高亮
    function highlightText(text, query) {
        if (!query) return text; // 如果没有查询，则返回原文本
        // 转义查询中的特殊字符，以防止正则表达式错误
        const escapedQuery = query.replace(/[-[\]/{}()*+?.\\^$|]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'gi'); // 创建正则表达式
        return text.replace(regex, '<span class="highlight">$1</span>'); // 用 span 标签包裹匹配部分
    }

    function filterAndRenderCountries(query) {
        // 使用全局的 countryData 进行过滤
        const filteredData = countryData.filter(item => {
            const commonName = item.country_name.common.toLowerCase();
            const chineseName = (item.country_name.chinese_name?.common || item.country_name.chinese_name || '').toLowerCase();
            const capital = (item.capital || '').toLowerCase();
            const callingCode = (item.calling_code || '').toLowerCase();
            const countryCode2 = (item.country_code_2 || '').toLowerCase();

            return (
                commonName.includes(query) ||  // 国家名称
                chineseName.includes(query) || // 中文名称
                capital.includes(query) ||  // 首都
                callingCode.includes(query) ||  // 电话区号
                countryCode2.includes(query)  // 国家代码
            );
        });

        if (filteredData.length === 0) {
            // 如果没有数据，显示“没有找到数据”消息
            table_tbody.innerHTML = '<tr><td colspan="7">没有找到数据</td></tr>';
        } else {
            // 调用处理和渲染函数
            handleCountryDataList(filteredData, query);
        }
    }

    // 处理和渲染国家数据列表
    function handleCountryDataList(data, query = '') {
        const elementNodes = data.map((item, index) => {
            return `
                <tr>
                    <th scope="row"><img src="${item.flags.svg}" width="50" class="img-fluid" alt="${item.country_name.common}"></th>
                    <td>${highlightText(item.country_name.common, query)}</td>
                    <td>${highlightText(item.country_name.chinese_name?.common || item.country_name.chinese_name, query)}</td>
                    <td>${highlightText(item.capital && item.capital !== 'undefined' ? item.capital : '', query)}</td>
                    <td>${item.currencies && Object.keys(item.currencies).length > 0 ? `${Object.keys(item.currencies)[0]}/${item.currencies[Object.keys(item.currencies)[0]]?.symbol || ''}` : 'N/A'}</td>
                    <td>${highlightText(item.calling_code && item.calling_code !== 'undefined' ? item.calling_code : '', query)}</td>
                    <td>${highlightText(item.country_code_2, query)}</td>
                </tr>
            `
        })
        renderingCountryDataList(elementNodes)
    }

    // 渲染国家数据列表
    function renderingCountryDataList(elementNodes) {
        table_tbody.innerHTML = elementNodes.join('')
    }
</script>

    <!-- Bootstrap5 核心 JavaScript 文件 -->
    <script src="./Bootstrap_js/bootstrap.bundle.min.js"></script>

</body>
</html>
