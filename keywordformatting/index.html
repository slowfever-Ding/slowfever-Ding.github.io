    <script>
        $(document).ready(function(){
            // 转换按钮点击事件
            $('#conversionButton').on('click', function () {
                // 获取原始文本
                let originalText = $('#originalTextField').val();

                // 检查原始文本是否包含逗号
                if (originalText.includes(',') || originalText.includes('，')) {
                    // 过滤原始文本中的逗号
                    originalText = originalText.replace(/[,，]/g, '');
                }

                // 调用处理转换文本格式函数
                let newText = processConvertingTextFormats(originalText);
                $('#convertTextField').val(newText);
            });

            // 复制按钮点击事件
            $('#copyButton').on('click', function () {
                let toast = $('#liveToast');
                let liveToast = new bootstrap.Toast(toast);
                let textToCopy = $("#convertTextField").val();
                let tempTextarea = $("<textarea>");
                $("body").append(tempTextarea);
                tempTextarea.val(textToCopy).select();
                document.execCommand("copy");
                tempTextarea.remove();
                
                // 弹出提示框
                if ($('#convertTextField').val() === '') {
                    toast.addClass('text-bg-danger').removeClass('text-bg-success');
                    toast.find('.toast-body').text('请转换后，再复制！');
                    liveToast.show();
                } else {
                    toast.addClass('text-bg-success').removeClass('text-bg-danger');
                    toast.find('.toast-body').text('复制成功！');
                    liveToast.show();
                }

            });

            /*
             *  处理转换文本格式
             *  @param {String} text 原始文本
             *  @return {String} 转换后的文本
             */
            function processConvertingTextFormats(text) {
                // 分割文本成行
                let lines = text.split("\n");
                // 过滤空行并转换格式
                return lines.filter(line => line.trim() !== "").join(",");
            }
        });
    </script>
