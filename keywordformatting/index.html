<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>关键字格式化</title>
    <link rel="shortcut icon" href="./favicon.ico" />
    <!-- Bootstrap5 核心 CSS 文件 -->
    <link href="./Bootstrap_css/bootstrap.min.css" rel="stylesheet">
    <!-- JavaScript 文件是可选的。从以下两种建议中选择一个即可！ -->

    <!--[if lt IE 9]>
    <script src="https://cdn.bootcdn.net/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->

    <style>
        html, body{height: 100%;}
        h1{
            font-family: "Noto Sans SC",serif;
            font-weight: 400;
            font-style: normal;
        }
        .pointer-events-none{
            pointer-events: none !important;
        }
    </style>

</head>
<body>

    <div class="container d-block d-md-flex h-100 align-items-center">
        <div class="w-100">
            <h1 class="text-center display-3 fw-bold my-3 py-3">
                <img src="./logo.jpg" class="img-fluid" alt="">
            </h1>
            <div class="row position-relative">
                <div class="col-md-6">
                    <div class="form-group">
                        <!--  原始文本域  -->
                        <label class="w-100">
                            <textarea id="originalTextField" class="form-control my-md-0 my-3" rows="15"
                            placeholder="固定格式：
xxxxxxxxxx
xxxxxxxxxx
xxxxxxxxxx
......"
                            ></textarea>
                        </label>
                    </div>
                </div>
                <div class="position-absolute top-50 start-50 translate-middle pointer-events-none">
                    <button id="conversionButton" class="text-center d-block btn btn-primary m-auto my-2 px-4">
                        转换
                    </button>
                    <button id="copyButton" class="text-center d-block btn btn-primary m-auto my-2 px-4">
                        复制
                    </button>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <!--  转换后文本域  -->
                        <label class="w-100">
                            <textarea id="convertTextField" class="form-control my-md-0 my-3" rows="15" readonly></textarea>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="liveToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        复制成功！
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>
    </div>



    <!-- Bootstrap5 核心 JavaScript 文件 -->
    <script src="./Bootstrap_js/bootstrap.bundle.min.js"></script>
    <script src="./js/jquery-3.5.1.min.js"></script>

    <script>
        $(document).ready(function(){
            // 转换按钮点击事件
            $('#conversionButton').on('click', function () {
                // 获取原始文本
                let originalText = $('#originalTextField').val();

                // 检查原始文本是否包含逗号
                if (originalText.includes(',')) {
                    // 替换原始文本中的逗号为空格
                    originalText = originalText.replace(/,/g, ' ');
                }

                // 调用处理转换文本格式函数
                let newText = processConvertingTextFormats(originalText);
                $('#convertTextField').val(newText);
            });

            // 复制按钮点击事件
            $('#copyButton').on('click', function () {
                let textToCopy = $("#convertTextField").val();
                let tempTextarea = $("<textarea>");
                $("body").append(tempTextarea);
                tempTextarea.val(textToCopy).select();
                document.execCommand("copy");
                tempTextarea.remove();
                // 弹出提示框
                if ($('#convertTextField').val() === '') {
                    alert("请输入要转换的文本！");
                } else {
                    let toastBootstrap = new bootstrap.Toast($('#liveToast'));
                    toastBootstrap.show();
                }
            });

            /*
             *  处理转换文本格式
             *  @param {String} text 原始文本
             *  @return {String} 转换后的文本
             */
            function processConvertingTextFormats(text) {
                return text.split("\n").join(",");
            }
        });
    </script>

</body>
</html>
